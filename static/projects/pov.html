  <script>
  var _lbSrcs = ["../static/images/pov/fd54de2d-85e2-4ad1-a5ae-1201b4fee68c_rw_1920.jpg","../static/images/pov/ba0346e0-e075-40be-a5f0-3c67865c4c78_rw_1920.jpg","../static/images/pov/fd54de2d-85e2-4ad1-a5ae-1201b4fee68c.jpg","../static/images/pov/ffda3e4c-cd32-46cb-bda4-e99689a8e52f_rw_1920.jpg","../static/images/pov/27d2a966-4007-40e0-b054-405f69fa2cc4_rw_1920.jpg","../static/images/pov/e283d207-eac8-4ff2-8303-d49ecf27c3e3_rw_1920.jpg","../static/images/pov/724d35a7-454d-4006-94b2-e6b68188cd2c_rw_1920.jpg","../static/images/pov/6547ccd7-01b8-42b0-8e6d-e90a227de377_rw_1920.jpg","../static/images/pov/9f361c28-10c9-4c27-a142-409867c837a5_rw_1920.jpg","../static/images/pov/b04c5724-5e00-4536-846f-c2be1ff584c2_rw_1920.jpg","../static/images/pov/5a61422c-1d65-4143-929c-dc69bb4df610_rw_1920.jpg","../static/images/pov/c58cdf59-fdc2-4229-913f-31004a2a40ae_rw_1920.jpg","../static/images/pov/549d581a-918f-448f-a284-e81b932383e2_rw_1920.jpg"];
  var _lbIdx = 0;
  var _lb = null;

  function _buildLightbox() {
    if (_lb) return;
    _lb = document.createElement('div');
    _lb.id = 'lb-backdrop';
    _lb.setAttribute('style', [
      'position:fixed', 'top:0', 'left:0', 'width:100vw', 'height:100vh',
      'background:rgba(0,0,0,.5)', 'z-index:9999',
      'display:none', 'align-items:center', 'justify-content:center'
    ].join(';'));
    _lb.innerHTML =
      '<button id="lb-prev" style="position:absolute;left:20px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;padding:8px;line-height:1;">&#8592;</button>' +
      '<img id="lb-img" src="" alt="" style="max-width:90vw;max-height:90vh;width:auto;height:auto;display:block;box-shadow:0 8px 40px rgba(0,0,0,.6);" />' +
      '<button id="lb-next" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;padding:8px;line-height:1;">&#8594;</button>' +
      '<button id="lb-close" style="position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1;">&times;</button>';
    document.body.appendChild(_lb);
    _lb.addEventListener('click', closeLightbox);
    document.getElementById('lb-img').addEventListener('click', function(e) { e.stopPropagation(); });
    document.getElementById('lb-prev').addEventListener('click', function(e) { e.stopPropagation(); navLightbox(-1); });
    document.getElementById('lb-next').addEventListener('click', function(e) { e.stopPropagation(); navLightbox(1); });
    document.getElementById('lb-close').addEventListener('click', function(e) { e.stopPropagation(); closeLightbox(); });
  }

  function openLightbox(idx) {
    _buildLightbox();
    _lbIdx = idx;
    document.getElementById('lb-img').src = _lbSrcs[idx];
    _lb.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    document.addEventListener('keydown', _lbKey);
  }
  function closeLightbox() {
    if (_lb) _lb.style.display = 'none';
    document.body.style.overflow = '';
    document.removeEventListener('keydown', _lbKey);
  }
  function navLightbox(dir) {
    _lbIdx = (_lbIdx + dir + _lbSrcs.length) % _lbSrcs.length;
    document.getElementById('lb-img').src = _lbSrcs[_lbIdx];
  }
  function _lbKey(e) {
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowRight') navLightbox(1);
    else if (e.key === 'ArrowLeft') navLightbox(-1);
  }
  </script>
