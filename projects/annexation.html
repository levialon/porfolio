  <script>
  var _lbSrcs = ["../static/images/annexation/8369fde3-933b-49d3-913a-9b2a7be5b0c1_rw_1920.jpeg","../static/images/annexation/def30cc8-0e9f-469b-9ecb-d6054b3b473c_rw_1920.jpeg","../static/images/annexation/088ffb8f-ee08-442e-a2f5-62340418bfbb_rw_1920.jpeg","../static/images/annexation/c6cb6a12-a96a-439c-88de-be9af738b196_rw_1920.jpeg","../static/images/annexation/58498dd6-b913-4a0d-b62d-de7df97e828a_rw_1920.jpeg","../static/images/annexation/a26ffb05-693d-451e-9453-757fa80122ed_rw_1920.jpeg","../static/images/annexation/4b6632bd-ca22-42fe-b329-065d63860b5e_rw_1920.jpeg","../static/images/annexation/6ad7be7b-71ff-4f85-9d00-cd0d41c350ae_rw_1920.jpeg"];
  var _lbIdx = 0;
  var _lb = null;

  function _buildLightbox() {
    if (_lb) return;
    _lb = document.createElement('div');
    _lb.id = 'lb-backdrop';
    _lb.innerHTML =
      '<button id="lb-prev" class="lb-btn lb-prev">&#8592;</button>' +
      '<img id="lb-img" class="lb-img" src="" alt="" />' +
      '<button id="lb-next" class="lb-btn lb-next">&#8594;</button>' +
      '<button id="lb-close" class="lb-btn lb-close">&times;</button>';
    document.body.appendChild(_lb);
    _lb.addEventListener('click', closeLightbox);
    document.getElementById('lb-img').addEventListener('click', function(e) { e.stopPropagation(); });
    document.getElementById('lb-prev').addEventListener('click', function(e) { e.stopPropagation(); navLightbox(-1); });
    document.getElementById('lb-next').addEventListener('click', function(e) { e.stopPropagation(); navLightbox(1); });
    document.getElementById('lb-close').addEventListener('click', function(e) { e.stopPropagation(); closeLightbox(); });
  }

  function openLightbox(idx) {
    _buildLightbox();
    _lbIdx = idx;
    document.getElementById('lb-img').src = _lbSrcs[idx];
    _lb.classList.add('lb-open');
    document.body.style.overflow = 'hidden';
    document.addEventListener('keydown', _lbKey);
  }
  function closeLightbox() {
    if (_lb) _lb.classList.remove('lb-open');
    document.body.style.overflow = '';
    document.removeEventListener('keydown', _lbKey);
  }
  function navLightbox(dir) {
    _lbIdx = (_lbIdx + dir + _lbSrcs.length) % _lbSrcs.length;
    document.getElementById('lb-img').src = _lbSrcs[_lbIdx];
  }
  function _lbKey(e) {
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowRight') navLightbox(1);
    else if (e.key === 'ArrowLeft') navLightbox(-1);
  }
  </script>

  <script>
  (function () {

    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      nav.classList.contains('is-open') ? closeNav() : openNav();

    // Close when a nav link is tapped
    nav.querySelectorAll('.wf-nav__link').forEach(function (a) {

    document.addEventListener('click', function (e) {
      if (!nav.contains(e.target) && !btn.contains(e.target)) closeNav();
