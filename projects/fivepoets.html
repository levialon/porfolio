  <script>
  var _lbSrcs = ["../static/images/fivepoets/0ab90c5e-a2a7-4eb2-8e68-80977a5c9c21_rw_1920.jpg","../static/images/fivepoets/2cb1c1ab-9740-4285-a804-0b55b96efa87_rw_1920-1.jpg","../static/images/fivepoets/c8d08ce2-86a4-492e-a8bc-b67aa99f2259.jpg","../static/images/fivepoets/8d30b294-a5d6-49ef-90a0-16fc88ca2263_rw_1920.jpg","../static/images/fivepoets/58c18836-7566-4855-a1ed-5cb2303b03bd_rw_1920.jpg","../static/images/fivepoets/2de6a601-e843-4648-b4da-b433008b0d5b_rw_1920.jpg","../static/images/fivepoets/5f5de2a8-13ed-446a-a774-2f0a7b14a940_rw_1920.jpg","../static/images/fivepoets/82d4a2a6-01ca-4eb4-94b5-a4a508109063_rw_1920.jpg","../static/images/fivepoets/51e1d692-18f4-4b35-a6ab-9a2ed6c59765_rw_1920.jpg","../static/images/fivepoets/a1815b28-590f-4105-878b-9593be687f7d_rw_1920.jpg","../static/images/fivepoets/c8d08ce2-86a4-492e-a8bc-b67aa99f2259_rw_1920.jpg","../static/images/fivepoets/ca02d0cb-2b8c-4be8-a2f7-61cc072c01a2_rw_1920.jpg"];
  var _lbIdx = 0;
  var _lb = null;

  function _buildLightbox() {
    if (_lb) return;
    _lb = document.createElement('div');
    _lb.id = 'lb-backdrop';
    _lb.innerHTML =
      '<button id="lb-prev" class="lb-btn lb-prev">&#8592;</button>' +
      '<img id="lb-img" class="lb-img" src="" alt="" />' +
      '<button id="lb-next" class="lb-btn lb-next">&#8594;</button>' +
      '<button id="lb-close" class="lb-btn lb-close">&times;</button>';
    document.body.appendChild(_lb);
    _lb.addEventListener('click', closeLightbox);
    document.getElementById('lb-img').addEventListener('click', function(e) { e.stopPropagation(); });
    document.getElementById('lb-prev').addEventListener('click', function(e) { e.stopPropagation(); navLightbox(-1); });
    document.getElementById('lb-next').addEventListener('click', function(e) { e.stopPropagation(); navLightbox(1); });
    document.getElementById('lb-close').addEventListener('click', function(e) { e.stopPropagation(); closeLightbox(); });
  }

  function openLightbox(idx) {
    _buildLightbox();
    _lbIdx = idx;
    document.getElementById('lb-img').src = _lbSrcs[idx];
    _lb.classList.add('lb-open');
    document.body.style.overflow = 'hidden';
    document.addEventListener('keydown', _lbKey);
  }
  function closeLightbox() {
    if (_lb) _lb.classList.remove('lb-open');
    document.body.style.overflow = '';
    document.removeEventListener('keydown', _lbKey);
  }
  function navLightbox(dir) {
    _lbIdx = (_lbIdx + dir + _lbSrcs.length) % _lbSrcs.length;
    document.getElementById('lb-img').src = _lbSrcs[_lbIdx];
  }
  function _lbKey(e) {
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowRight') navLightbox(1);
    else if (e.key === 'ArrowLeft') navLightbox(-1);
  }
  </script>
